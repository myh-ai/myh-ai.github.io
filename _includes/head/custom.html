{% include base_path %}

<!-- start custom head snippets -->

<!-- Scientific Noir web fonts -->

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#F8F6F1"/>

<!-- open all links in a new tab (keep same-page section anchors in place) -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var links = document.getElementsByTagName('a');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (!href) continue;                      // skip buttons/toggles with no href
      if (href.charAt(0) === '#') continue;     // same-page anchor
      if (href.indexOf('/#') !== -1) continue;  // home-section anchor
      links[i].setAttribute('target', '_blank');
      links[i].setAttribute('rel', 'noopener noreferrer');
    }
  });
</script>

<!-- gentle scroll-reveal for content sections (fails safe: content stays visible) -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    try {
      var els = document.querySelectorAll('.sn-home section');
      if (!els.length) return;
      for (var i = 0; i < els.length; i++) els[i].classList.add('sn-anim');
      if (!('IntersectionObserver' in window)) return;
      var vh = window.innerHeight || document.documentElement.clientHeight;
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.remove('sn-hidden'); io.unobserve(e.target); }
        });
      }, { rootMargin: '0px 0px -8% 0px', threshold: 0.05 });
      for (var j = 0; j < els.length; j++) {
        if (els[j].getBoundingClientRect().top > vh * 0.9) els[j].classList.add('sn-hidden');
        io.observe(els[j]);
      }
      setTimeout(function () {
        var h = document.querySelectorAll('.sn-home .sn-hidden');
        for (var k = 0; k < h.length; k++) h[k].classList.remove('sn-hidden');
      }, 2500);
    } catch (err) {
      var h = document.querySelectorAll('.sn-home .sn-hidden');
      for (var m = 0; m < h.length; m++) h[m].classList.remove('sn-hidden');
    }
  });
</script>

<!-- end custom head snippets -->
