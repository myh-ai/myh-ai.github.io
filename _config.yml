# Welcome to Jekyll!
#
# This config file controls site-wide settings for your Academic Pages / Jekyll site.
# After editing this file on GitHub, GitHub Pages may take a few minutes to rebuild.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Moustafa Yehia Hassan"
title_separator          : "-"
name                     : &name ""
description              : &description "Interdisciplinary AI/NLP researcher focusing on representation and distributional fidelity auditing to probe the divergence between machine simulation and human text processing."
url                      : "https://myh-ai.github.io"
baseurl                  : ""
repository               : "myh-ai/myh-ai.github.io"

# Site Author
# These fields appear in the author sidebar.
author:
  # Biographic information
  avatar           : "avatar.jpg"
  name             : "Moustafa Yehia Hassan"
  pronouns         :
  bio              : "Interdisciplinary AI/NLP researcher, writer, and programmer working on trustworthy LLM evaluation, mental-health NLP, distributional fidelity auditing, and the human dimensions of AI."
  location         : "Qatar"
  employer         : "Doha Institute"
  uri              : "https://myh-ai.github.io"
  email            : "moustafayhassan@gmail.com"

  # Academic websites
  academia         :
  arxiv            :
  googlescholar    : "https://scholar.google.com/citations?user=EqmgPx4AAAAJ&hl=en"
  inspire-hep      :
  impactstory      :
  orcid            : "https://orcid.org/0009-0007-6324-3770"
  semantic         :
  ssrn             :
  pubmed           :
  researchgate     :
  scopus           :
  zotero           :

  # Repositories and software development
  bitbucket        :
  codepen          :
  dribbble         :
  github           : "myh-ai"
  kaggle           :
  stackoverflow    :

  # Social media and public writing
  artstation       :
  bluesky          :
  facebook         :
  flickr           :
  foursquare       :
  goodreads        :
  google_plus      :
  keybase          :
  instagram        :
  lastfm           :
  linkedin         : "moustafa-y-hassan-222ab8104"
  mastodon         :
  medium           :
  pinterest        :
  soundcloud       :
  steam            :
  telegram         :
  tumblr           :
  twitter          : "moustafammhassan"
  vine             :
  weibo            :
  wikipedia        :
  xing             :
  youtube          :
  zhihu            :

# Publication Categories
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles & Manuscripts"
  conferences:
    title: "Conference Papers"

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

comments:
  provider               : false
  disqus:
    shortname            :
  discourse:
    server               :
  facebook:
    appid                :
    num_posts            :
    colorscheme          :

staticman:
  allowedFields          : ["name", "email", "url", "message"]
  branch                 : "master"
  commitMessage          : "New comment."
  filename               : "comment-{@timestamp}"
  format                 : "yml"
  moderation             : true
  path                   : "_data/comments/{options.slug}"
  requiredFields         : ["name", "email", "message"]
  transforms:
    email                : "md5"
  generatedFields:
    date:
      type               : "date"
      options:
        format           : "iso8601"

atom_feed:
  hide                   : false
  path                   :

# SEO Related
google_site_verification :
bing_site_verification   :
alexa_site_verification  :
yandex_site_verification :

# Social Sharing
twitter:
  username               : &twitter "moustafammhassan"

facebook:
  username               :
  app_id                 :
  publisher              :

og_image                 :
og_description           : "Research portfolio of Moustafa Yehia Hassan: AI/NLP, trustworthy language models, mental-health NLP, distributional fidelity auditing, and public essays on AI and the human condition."

# Social profiles
social:
  type                   : "Person"
  name                   : "Moustafa Yehia Hassan"
  links:
    - "https://github.com/myh-ai"
    - "https://escapingplanetearth.blogspot.com/"
    - "https://www.linkedin.com/in/moustafa-y-hassan-222ab8104/"
    - "https://scholar.google.com/citations?user=EqmgPx4AAAAJ&hl=en"
    - "https://orcid.org/0009-0007-6324-3770"

# Analytics
analytics:
  provider               : false
  google:
    tracking_id          :

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections used by the template
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults for pages and collections
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true

  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: false

  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: false

  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comments: false

  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Asia/Qatar

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Mimic GitHub Pages with --safe
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
